<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Premium Space</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Poppins:wght@400;600;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <div class="space-background"></div>

    <div class="content-wrapper">
        <div class="left-section">
            <div class="hero-text">
                <h1>CREATE NEW<br><span class="highlight-purple">PASSWORD!</span></h1>
            </div>
        </div>
        
        <div class="right-section">
            <main class="glass-card">
                <h2 class="form-title" style="font-size: 28px; margin-bottom: 8px; margin-top: -10px; text-align: center;">Set New Password</h2>
                <p class="instruction-text text-left" style="margin-top: 0;">Enter the 4-digit code sent to your email<br>and your new password.</p>
                
                <form class="login-form" action="index.html">
                    <div class="input-group">
                        <label for="code">4-Digit Code</label>
                        <input type="text" id="code" placeholder="0000" maxlength="4" pattern="\d{4}" required style="letter-spacing: 8px; text-align: center; font-size: 20px; font-weight: bold;">
                    </div>
                    
                    <div class="input-group">
                        <label for="new-password">New Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="new-password" placeholder="Enter new password" required>
                            <button type="button" class="toggle-password" aria-label="Toggle password visibility">
                                <i class="ph ph-eye-slash"></i>
                            </button>
                        </div>
                    </div>
                    
                    <button type="submit" id="update-btn" class="submit-btn" style="margin-top: 10px;" disabled>Update Password</button>
                </form>
                
                <div class="divider">
                    <span>or</span>
                </div>
                
                <p class="footer-text">
                    <a href="index.html">Back to Sign in</a>
                </p>
                
                <img src="astronaut_chibi_bg-removebg-preview.png" alt="Astronaut" class="astronaut-img">
            </main>
        </div>
    </div>
    
    <script src="move.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const codeInput = document.getElementById('code');
            const newPasswordInput = document.getElementById('new-password');
            const updateBtn = document.getElementById('update-btn');

            function checkFields() {
                if (codeInput && newPasswordInput && updateBtn) {
                    // Se asegura de que ambos campos tengan contenido
                    if (codeInput.value.trim() !== '' && newPasswordInput.value.trim() !== '') {
                        updateBtn.disabled = false;
                    } else {
                        updateBtn.disabled = true;
                    }
                }
            }

            if (codeInput && newPasswordInput) {
                codeInput.addEventListener('input', checkFields);
                newPasswordInput.addEventListener('input', checkFields);
            }
        });
    </script>
</body>
</html>
