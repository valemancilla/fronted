<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Premium Space</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Poppins:wght@400;600;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <div class="space-background"></div>

    <div class="content-wrapper">
        <div class="left-section">
            <div class="hero-text">
                <h1>RECOVER YOUR<br><span class="highlight-purple">ACCOUNT!</span></h1>
            </div>
        </div>
        
        <div class="right-section">
            <main class="glass-card">
                <h2 class="form-title" style="font-size: 28px; margin-bottom: 8px; margin-top: -10px; text-align: center;">Forgot Password</h2>
                <p class="instruction-text text-left" style="margin-top: 0;">Please enter your email to reset the<br>password</p>
                
                <form class="login-form" action="reset-password.html">
                    <div class="input-group">
                        <label for="email">Enter your email address</label>
                        <input type="email" id="email" placeholder="username@gmail.com" required>
                    </div>
                    
                    <button type="submit" id="reset-btn" class="submit-btn" style="margin-top: 10px;" disabled>Continue</button>
                </form>
                
                <div class="divider">
                    <span>or</span>
                </div>
                
                <p class="footer-text">
                    Remember your password? <a href="index.html">Back to Sign in</a>
                </p>
                
                <img src="astronaut_chibi_bg-removebg-preview.png" alt="Astronaut" class="astronaut-img">
            </main>
        </div>
    </div>
    
    <script src="move.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const emailInput = document.getElementById('email');
            const resetBtn = document.getElementById('reset-btn');

            if (emailInput && resetBtn) {
                emailInput.addEventListener('input', () => {
                    if (emailInput.value.trim() !== '') {
                        resetBtn.disabled = false;
                        resetBtn.textContent = 'Reset Password';
                    } else {
                        resetBtn.disabled = true;
                        resetBtn.textContent = 'Continue';
                    }
                });
            }
        });
    </script>
</body>
</html>
