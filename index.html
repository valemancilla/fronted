<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Premium Space</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Poppins:wght@400;600;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <!-- La imagen exportada como fondo -->
    <div class="space-background"></div>
    <canvas id="stars-canvas" class="bg-stars-canvas"></canvas>

    <div class="content-wrapper">
        <div class="left-section">
            <div class="hero-text">
                <h1>SIGN IN TO YOUR<br><span class="highlight-purple">ADVENTURE!</span></h1>
            </div>
        </div>
        
        <div class="right-section">

            <main class="glass-card">
                <div class="logo-area">
                    <p>Sign in</p>
                </div>
                
                <form id="loginForm" class="login-form">
                    <div class="input-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="username@gmail.com" required>
                    </div>
                    
                    <div class="input-group">
                        <label for="password">Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="password" placeholder="Password" required>
                            <button type="button" class="toggle-password" aria-label="Toggle password visibility">
                                <i class="ph ph-eye-slash"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div class="forgot-link">
                        <a href="forgot-password.html">Forgot Password?</a>
                    </div>
                    
                    <button type="submit" class="submit-btn">Sign in</button>
                </form>
                
                <div class="divider">
                    <span>or continue with</span>
                </div>
                
                <button type="button" class="google-btn">
                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google">
                </button>
                
                <p class="footer-text">
                    Don't have an account? <a href="register.html">Sign up</a>
                </p>
                
                <img src="astronaut_chibi_bg-removebg-preview.png" alt="Astronaut" class="astronaut-img">
            </main>
        </div>
    </div>
    
    <script src="move.js"></script>
    <script src="stars.js"></script>
</body>
</html>
