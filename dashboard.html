<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Premium Space</title>
    <link rel="stylesheet" href="style-dashboard.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Poppins:wght@400;600;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <!-- Cinematic Background Elements -->
    <canvas id="stars-canvas" class="bg-stars-canvas"></canvas>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>
    
    <div class="dashboard-container">
        <div class="top-bar">
            <button class="logout-btn" onclick="window.location.href='index.html'">
                <span>Log out</span>
                <i class="ph ph-sign-out"></i>
            </button>
        </div>

        <div class="welcome-section">
            <div class="welcome-card-wrapper">
                <div class="card-ambient-light"></div>
                <div class="welcome-card">
                    <div class="welcome-content">
                        <h1>¡Bienvenido!</h1>
                        <p>Has iniciado sesión exitosamente.</p>
                        
                        <div class="success-icon-wrapper">
                            <div class="pulse-ring pulse-ring-1"></div>
                            <div class="pulse-ring pulse-ring-2"></div>
                            <i class="ph ph-check-circle"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="stars.js"></script>
</body>
</html>
